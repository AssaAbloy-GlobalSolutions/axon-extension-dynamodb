spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.HSQLDialect
spring.flyway.enabled=true
# Log levels
logging.level.com.aags=debug
logging.level.magnetar=DEBUG


# Database
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/alderaan
spring.datasource.username=alderaan
spring.datasource.password=sa
spring.jpa.database=POSTGRESQL
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=magnetar.fulliautomatix.axonspringglue.jpa.AxonPsqlDialect
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=1000
spring.datasource.hikari.maximum-pool-size=20
spring.jpa.open-in-view=false